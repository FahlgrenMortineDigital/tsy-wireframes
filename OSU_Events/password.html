<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter Password — OSU Events Wireframes</title>
  <style>
    @font-face {
      font-family: 'BuckeyeSans';
      src: url('Buckeye2_Fonts/BuckeyeSans-Bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
    }
    @font-face {
      font-family: 'BuckeyeSans';
      src: url('Buckeye2_Fonts/BuckeyeSans-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'BuckeyeSans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .logo-bar {
      background: #bb0000;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 6px;
      display: inline-block;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .input-group {
      position: relative;
      margin-bottom: 16px;
    }

    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      font-family: inherit;
      border: 2px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus {
      border-color: #bb0000;
    }

    .error-msg {
      color: #bb0000;
      font-size: 13px;
      margin-bottom: 12px;
      min-height: 20px;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      color: #fff;
      background: #bb0000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #990000; }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .footer-note {
      margin-top: 24px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="logo-bar">The Ohio State University</div>
  <h1>Wireframe Review</h1>
  <p class="subtitle">Enter the password to view the event site wireframes.</p>

  <form id="pw-form" onsubmit="return handleSubmit(event)">
    <div class="input-group">
      <input type="password" id="pw-input" placeholder="Enter password" autocomplete="off" autofocus>
    </div>
    <div class="error-msg" id="error-msg"></div>
    <button type="submit" id="submit-btn">Continue</button>
  </form>

  <p class="footer-note">This site is password-protected for client review only.</p>
</div>

<script>
function handleSubmit(e) {
  e.preventDefault();
  var pw = document.getElementById('pw-input').value.trim();
  var errEl = document.getElementById('error-msg');
  var btn = document.getElementById('submit-btn');

  if (!pw) {
    errEl.textContent = 'Please enter a password.';
    return false;
  }

  errEl.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Checking...';

  fetch('/.netlify/functions/check-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pw })
  })
  .then(function(res) {
    if (res.ok) {
      // Cookie is set by the function response
      // Redirect to the originally requested page
      var params = new URLSearchParams(window.location.search);
      var redirect = params.get('redirect') || '/index.html';
      window.location.href = redirect;
    } else {
      errEl.textContent = 'Incorrect password. Please try again.';
      btn.disabled = false;
      btn.textContent = 'Continue';
      document.getElementById('pw-input').select();
    }
  })
  .catch(function(err) {
    errEl.textContent = 'Connection error. Please try again.';
    btn.disabled = false;
    btn.textContent = 'Continue';
  });

  return false;
}
</script>

</body>
</html>
